<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8"/>
  <title>HMF Email Filer</title>
  <script src="https://appsforoffice.microsoft.com/lib/1/hosted/office.js"></script>
  <script>
    var SETUP_VERSION = "v31";
    var s = document.createElement("script");
    s.src = "setup.js?t=" + Date.now();
    document.head.appendChild(s);
  </script>
  <style>
    body { font-family: 'Segoe UI', sans-serif; padding: 16px; color: #1a1a1a; margin: 0; font-size: 13px; }
    h2 { font-size: 15px; margin: 0 0 16px; font-weight: 700; }
    .ss { border-top: 1px solid #e0e0e0; padding: 12px 0; }
    .ss-head { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.6px; color: #888; margin-bottom: 8px; }
    .ss-row { display: flex; gap: 6px; align-items: center; margin-bottom: 4px; }
    .ss-sub { font-size: 12px; color: #555; margin-top: 5px; min-height: 16px; }
    .ss-label { display: block; font-size: 12px; color: #555; margin-bottom: 4px; }
    .ss-select { flex: 1; font-size: 12px; padding: 4px 6px; border: 1px solid #ccc; border-radius: 3px; font-family: 'Segoe UI', sans-serif; min-width: 0; }
    .ss-select:disabled { background: #f3f3f3; color: #aaa; }
    .btn { padding: 6px 14px; border: none; border-radius: 3px; font-size: 12px; cursor: pointer; font-family: 'Segoe UI', sans-serif; }
    .btn:disabled { opacity: 0.5; cursor: default; }
    .btn-primary { background: #0078d4; color: #fff; }
    .btn-secondary { background: #f3f3f3; color: #1a1a1a; border: 1px solid #ccc; }
    #ver { margin-top: 20px; font-size: 11px; color: #bbb; }
    .ss-pinned-row { display: flex; justify-content: space-between; align-items: center; font-size: 12px; color: #1a1a1a; padding: 2px 0; }
    .ss-pin-remove { border: none; background: none; color: #a4262c; cursor: pointer; font-size: 13px; padding: 0 2px; }
    .tl-learned { color: #107c10; }
    .tl-ambiguous { color: #ca5010; }
    .match-learned { color: #107c10; }
    .match-ambiguous { color: #ca5010; }
  </style>
</head>
<body>
  <h2>HMF Email Filer</h2>

  <section class="ss">
    <div class="ss-head">Account</div>
    <div id="account-status">Checking...</div>
    <div style="margin-top:8px">
      <button id="connectBtn" class="btn btn-primary" style="display:none">Connect to Microsoft</button>
    </div>
  </section>

  <section class="ss">
    <div class="ss-head">Folders</div>
    <div class="ss-row">
      <select id="rootFolderPicker" class="ss-select" onchange="onRootFolderChange()" disabled>
        <option value="">Choose root folder…</option>
      </select>
      <button id="refreshBtn" class="btn btn-secondary" title="Refresh case folders" disabled>↻</button>
    </div>
    <div id="folder-count" class="ss-sub"></div>
  </section>

  <section class="ss">
    <div class="ss-head">Pinned Folders</div>
    <div id="pinned-list" class="ss-sub"></div>
    <div class="ss-row" style="margin-top:6px">
      <select id="pinnedFolderPicker" class="ss-select" disabled>
        <option value="">Choose folder to pin…</option>
      </select>
      <button id="pinBtn" class="btn btn-secondary" onclick="addPinnedFolder()" disabled>Pin</button>
    </div>
  </section>

  <section class="ss">
    <div class="ss-head">Learned Contacts</div>
    <div id="learned-list" class="ss-sub"></div>
  </section>

  <section class="ss">
    <div class="ss-head">Baseline</div>
    <div id="baseline-status" class="ss-sub"></div>
    <div style="margin-top:8px">
      <button id="setBaselineBtn" class="btn btn-secondary">Set Baseline</button>
    </div>
  </section>

  <section class="ss">
    <div class="ss-head">Filing Behavior</div>
    <div class="ss-label">Sort order</div>
    <select id="sortOrderPicker" class="ss-select" onchange="onSortOrderChange()" style="width:100%">
      <option value="date-desc">Newest first</option>
      <option value="date-asc">Oldest first</option>
      <option value="folder">By target folder</option>
    </select>
  </section>

  <section class="ss">
    <div class="ss-head">Liz It</div>
    <div class="ss-label">Forward-to email</div>
    <input id="lizItEmail" type="email" placeholder="email@hmflaw.com" oninput="onLizItEmailChange()"
      style="width:100%;box-sizing:border-box;font-size:12px;padding:4px 6px;border:1px solid #ccc;border-radius:3px;font-family:'Segoe UI',sans-serif">
    <div class="ss-sub">Forwards the latest email to this address, then files the thread.</div>
  </section>

  <div id="ver"></div>
</body>
</html>
