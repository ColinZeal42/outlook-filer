<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8"/>
  <title>HMF Email Filer Setup</title>
  <script src="https://appsforoffice.microsoft.com/lib/1/hosted/office.js"></script>
  <script>
    var SETUP_VERSION = "v23";
    var s = document.createElement("script");
    s.src = "setup.js?t=" + Date.now();
    document.head.appendChild(s);
  </script>
  <style>
    body { font-family: 'Segoe UI', sans-serif; padding: 16px; color: #1a1a1a; margin: 0; }
    h2 { font-size: 16px; margin: 0 0 14px; }
    #status { font-size: 13px; margin-bottom: 14px; padding: 8px 12px; border-radius: 4px; background: #f3f3f3; }
    .btn { padding: 7px 16px; color: white; border: none; border-radius: 4px; cursor: pointer; font-size: 13px; }
    .btn:disabled { background: #aaa; cursor: default; }
    #connectBtn { background: #0078d4; }
    #refreshBtn { display: none; margin-left: 6px; background: #555; }
    #processBtn { display: none; margin-top: 12px; background: #107c10; }
    #fileSelectedBtn { display: none; margin-top: 6px; margin-left: 6px; background: #8764b8; }
    #fileInboxBtn { display: none; margin-top: 6px; margin-left: 6px; background: #c43e1c; }
    #queue-status { font-size: 13px; margin-top: 12px; color: #555; min-height: 18px; }
    /* Email card */
    #email-card { display: none; margin-top: 10px; }
    #email-nav { display: flex; align-items: center; gap: 8px; margin-bottom: 12px; }
    .nav-btn { background: #f3f3f3; border: 1px solid #ccc; border-radius: 3px; padding: 2px 10px; cursor: pointer; font-size: 15px; line-height: 1.4; }
    .nav-btn:disabled { opacity: 0.35; cursor: default; }
    #email-counter { font-size: 12px; color: #888; }
    #email-subject-text { font-weight: 700; font-size: 15px; margin-bottom: 5px; line-height: 1.3; }
    #email-meta { font-size: 13px; color: #1a1a1a; margin-bottom: 6px; white-space: pre-line; }
    #email-match-line { font-size: 13px; font-weight: 600; color: #0078d4; margin-bottom: 10px; }
    #email-match-line.no-match { color: #999; font-weight: normal; font-style: italic; }
    #email-body { font-size: 12px; font-family: 'Segoe UI', sans-serif; line-height: 1.55; color: #333; background: #f9f9f9; border: 1px solid #e0e0e0; border-radius: 4px; padding: 10px 12px; margin: 0 0 12px; white-space: pre-wrap; word-break: break-word; max-height: 190px; overflow-y: auto; min-height: 36px; }
    #email-btns { display: flex; gap: 6px; }
    .action-btn { padding: 6px 14px; color: white; border: none; border-radius: 4px; cursor: pointer; font-size: 13px; }
    .action-btn:disabled { background: #bbb !important; cursor: default; }
    .file-btn { background: #107c10; }
    .delete-btn { background: #a4262c; }
    .ignore-btn { background: #605e5c; }
    #ver { margin-top: 20px; font-size: 11px; color: #bbb; }
  </style>
</head>
<body>
  <h2>HMF Email Filer</h2>
  <div id="status">Checking status...</div>
  <button id="connectBtn" class="btn">Connect to Microsoft</button>
  <button id="refreshBtn" class="btn">Refresh Folders</button>
  <br/>
  <button id="processBtn" class="btn">File Unsent Emails</button>
  <button id="fileSelectedBtn" class="btn">File This Email</button>
  <button id="fileInboxBtn" class="btn">File Inbox</button>
  <div id="queue-status"></div>
  <div id="email-card">
    <div id="email-nav">
      <button id="prevEmailBtn" class="nav-btn">&#8592;</button>
      <span id="email-counter"></span>
      <button id="nextEmailBtn" class="nav-btn">&#8594;</button>
    </div>
    <div id="email-subject-text"></div>
    <div id="email-meta"></div>
    <div id="email-match-line"></div>
    <pre id="email-body"></pre>
    <div id="email-btns">
      <button id="fileItBtn" class="action-btn file-btn">File It</button>
      <button id="deleteItBtn" class="action-btn delete-btn">Delete</button>
      <button id="ignoreItBtn" class="action-btn ignore-btn">Ignore</button>
    </div>
  </div>
  <div id="ver"></div>
</body>
</html>
