<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8"/>
  <title>HMF Email Filer Setup</title>
  <script src="https://appsforoffice.microsoft.com/lib/1/hosted/office.js"></script>
  <script>
    var SETUP_VERSION = "v22";
    var s = document.createElement("script");
    s.src = "setup.js?t=" + Date.now();
    document.head.appendChild(s);
  </script>
  <style>
    body { font-family: 'Segoe UI', sans-serif; padding: 20px; color: #1a1a1a; margin: 0; }
    h2 { font-size: 16px; margin: 0 0 14px; }
    #status { font-size: 13px; margin-bottom: 14px; padding: 8px 12px; border-radius: 4px; background: #f3f3f3; }
    .btn { padding: 7px 16px; color: white; border: none; border-radius: 4px; cursor: pointer; font-size: 13px; }
    .btn:disabled { background: #aaa; cursor: default; }
    #connectBtn { background: #0078d4; }
    #refreshBtn { display: none; margin-left: 6px; background: #555; }
    #processBtn { display: none; margin-top: 12px; background: #107c10; }
    #fileSelectedBtn { display: none; margin-top: 6px; margin-left: 6px; background: #8764b8; }
    #fileInboxBtn { display: none; margin-top: 6px; margin-left: 6px; background: #c43e1c; }
    #queue-status { font-size: 14px; margin-top: 12px; color: #555; min-height: 20px; }
    #queue { margin-top: 8px; }
    .queue-row { display: flex; flex-direction: column; gap: 4px; padding: 8px 0; border-bottom: 1px solid #eee; }
    .queue-row.done { opacity: 0.4; }
    .queue-top { display: flex; align-items: center; gap: 6px; flex-wrap: wrap; }
    .queue-subject { flex: 1; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; font-weight: 600; font-size: 14px; }
    .queue-arrow { color: #aaa; flex-shrink: 0; }
    .queue-folder { color: #0078d4; flex-shrink: 0; max-width: 120px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; font-weight: 600; }
    .queue-badge { font-size: 11px; color: #aaa; font-style: italic; flex-shrink: 0; }
    .queue-meta { font-size: 12px; color: #888; padding-left: 2px; }
    .file-btn { flex-shrink: 0; padding: 4px 10px; background: #107c10; color: white; border: none; border-radius: 3px; cursor: pointer; font-size: 13px; }
    .delete-btn { flex-shrink: 0; padding: 4px 10px; background: #a4262c; color: white; border: none; border-radius: 3px; cursor: pointer; font-size: 13px; }
    .ignore-btn { flex-shrink: 0; padding: 4px 10px; background: #605e5c; color: white; border: none; border-radius: 3px; cursor: pointer; font-size: 13px; }
    .file-btn:disabled, .delete-btn:disabled, .ignore-btn:disabled { background: #bbb; cursor: default; }
    #ver { margin-top: 20px; font-size: 11px; color: #bbb; }
  </style>
</head>
<body>
  <h2>HMF Email Filer</h2>
  <div id="status">Checking status...</div>
  <button id="connectBtn" class="btn">Connect to Microsoft</button>
  <button id="refreshBtn" class="btn">Refresh Folders</button>
  <br/>
  <button id="processBtn" class="btn">File Unsent Emails</button>
  <button id="fileSelectedBtn" class="btn">File This Email</button>
  <button id="fileInboxBtn" class="btn">File Inbox</button>
  <div id="queue-status"></div>
  <div id="queue"></div>
  <div id="ver"></div>
</body>
</html>
