<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8"/>
  <title>HMF Email Filer</title>
  <script src="https://appsforoffice.microsoft.com/lib/1/hosted/office.js"></script>
  <style>
    body { font-family: 'Segoe UI', sans-serif; display: flex; flex-direction: column;
           align-items: center; justify-content: center; height: 100vh; margin: 0;
           background: #fff; color: #1a1a1a; }
    h3 { font-size: 15px; margin: 0 0 20px; text-align: center; padding: 0 16px; }
    .btns { display: flex; gap: 12px; }
    button { padding: 10px 28px; font-size: 14px; border: none; border-radius: 4px; cursor: pointer; }
    #yes { background: #107c10; color: white; }
    #no  { background: #a80000; color: white; }
  </style>
</head>
<body>
  <h3 id="msg">Loading...</h3>
  <div class="btns">
    <button id="yes">Yes, file it</button>
    <button id="no">Skip</button>
  </div>
  <script>
    Office.onReady(function() {
      var params = new URLSearchParams(window.location.search);
      var folder = params.get("folder") || "?";
      var subject = params.get("subject") || "";
      document.getElementById("msg").textContent =
        "File “" + subject + "” to “" + folder + "”?";
      document.getElementById("yes").onclick = function() {
        Office.context.ui.messageParent("yes");
      };
      document.getElementById("no").onclick = function() {
        Office.context.ui.messageParent("no");
      };
    });
  </script>
</body>
</html>
