<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8"/>
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate"/>
  <meta http-equiv="Pragma" content="no-cache"/>
  <meta http-equiv="Expires" content="0"/>
  <title>HMF Email Filer</title>
  <script src="https://appsforoffice.microsoft.com/lib/1/hosted/office.js"></script>
  <script>
    var DIALOG_VERSION = "v10";
    var s = document.createElement("script");
    s.src = "dialog.js?t=" + Date.now();
    document.head.appendChild(s);
  </script>
  <style>
    body { font-family: 'Segoe UI', sans-serif; padding: 20px; color: #1a1a1a; margin: 0; font-size: 17px; }
    #status { font-size: 16px; margin-bottom: 10px; color: #555; }
    #queue-status { font-size: 16px; margin-bottom: 12px; color: #555; min-height: 20px; }

    #thread-list { margin-top: 10px; }
    .tl-group { border: 1px solid #e0e0e0; border-radius: 4px; margin-bottom: 9px; overflow: hidden; }
    .tl-header { display: flex; align-items: center; gap: 8px; padding: 9px 12px; background: #f9f9f9; font-size: 16px; user-select: none; }
    .action-strip { display: none; padding: 8px 14px; background: #f0f4f9; border-top: 1px solid #dce8f5; gap: 8px; align-items: center; flex-wrap: wrap; }
    .tl-group:hover .action-strip,
    .tl-group:focus-within .action-strip { display: flex; }
    .strip-select { font-size: 14px; padding: 5px 8px; border: 1px solid #b0c8e0; border-radius: 3px; background: #fff; font-family: 'Segoe UI', sans-serif; min-width: 160px; max-width: 230px; color: #1a1a1a; cursor: pointer; }
    .strip-select:focus { outline: none; border-color: #0078d4; }
    .strip-sep { width: 1px; height: 22px; background: #c8d8ea; flex-shrink: 0; }
    .strip-armed-note { font-size: 13px; color: #0078d4; font-style: italic; flex-basis: 100%; margin-bottom: 2px; }
    .strip-snippet { font-size: 13px; color: #444; font-style: italic; white-space: pre-wrap; flex-basis: 100%; margin-bottom: 4px; line-height: 1.5; }
    .strip-replied { color: #107c10; font-weight: 600; font-style: normal; margin-left: 6px; }
    .strip-forwarded { color: #8764b8; font-weight: 600; font-style: normal; margin-left: 6px; }
    .s-btn { padding: 5px 15px; border: none; border-radius: 3px; color: #fff; font-size: 14px; cursor: pointer; font-family: 'Segoe UI', sans-serif; font-weight: 500; white-space: nowrap; flex-shrink: 0; }
    .s-btn:disabled { background: #bbb !important; cursor: default; }
    .s-file { background: #107c10; }
    .s-reply-file { background: #0078d4; }
    .s-del { background: #a4262c; }
    .s-reply-del { background: #a4262c; }
    .s-confirm { background: #107c10; font-weight: 700; }
    .s-skip { background: #605e5c; }
    .tl-header:hover { background: #f0f0f0; }
    .tl-replied { background: #c8efc8; }
    .tl-replied:hover { background: #b8e5b8; }
    .tl-forwarded { background: #e8d5f5; }
    .tl-forwarded:hover { background: #dcc8f0; }
    .tl-reply-icon { font-size: 13px; font-weight: 700; margin-left: auto; padding-left: 8px; flex-shrink: 0; }
    .tl-replied .tl-reply-icon { color: #107c10; }
    .tl-forwarded .tl-reply-icon { color: #8764b8; }
    .tl-pill { background: #0078d4; color: #fff; border-radius: 10px; padding: 2px 8px; font-size: 13px; font-weight: 700; flex-shrink: 0; }
    .tl-subject { font-weight: 600; flex: 1; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .tl-match { font-size: 15px; color: #0078d4; flex-shrink: 0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 220px; }
    .tl-no-match { color: #aaa; font-style: italic; }
    .tl-internal { color: #a4262c; font-style: italic; }
    .tl-chevron { font-size: 13px; color: #888; flex-shrink: 0; }
    .tl-date { font-size: 13px; color: #1a1a1a; flex-shrink: 0; white-space: nowrap; font-weight: 400; }
    .tl-body { border-top: 1px solid #e0e0e0; padding: 10px 12px; }
    .tl-email { margin-bottom: 10px; }
    .tl-email-label { display: flex; align-items: flex-start; gap: 9px; cursor: pointer; }
    .tl-email-label input[type=checkbox] { margin-top: 3px; flex-shrink: 0; width: 17px; height: 17px; }
    .tl-email-content { flex: 1; min-width: 0; }
    .tl-email-meta { font-size: 15px; font-weight: 600; color: #1a1a1a; margin-bottom: 3px; }
    .tl-email-date { font-weight: 400; color: #888; }
    .tl-email-body { font-size: 15px; color: #555; line-height: 1.5; background: #f9f9f9; border: 1px solid #e8e8e8; border-radius: 3px; padding: 6px 10px; white-space: pre-wrap; word-break: break-word; cursor: pointer; }
    .tl-email-body:hover { background: #eef4fb; border-color: #c7e0f4; }
    .tl-badge { display: inline-block; font-size: 12px; font-weight: 700; color: #fff; background: #ca5010; border-radius: 3px; padding: 1px 5px; margin-right: 3px; vertical-align: middle; }
    .tl-fwd { background: #8764b8; }
    .tl-folder-select { width: 100%; margin: 8px 0; font-size: 15px; padding: 5px 7px; border: 1px solid #ccc; border-radius: 3px; font-family: 'Segoe UI', sans-serif; }
    .tl-actions { display: flex; gap: 6px; margin-top: 6px; flex-wrap: wrap; align-items: center; }
    .tl-btn { padding: 7px 16px; border: none; border-radius: 3px; color: #fff; font-size: 15px; cursor: pointer; font-family: 'Segoe UI', sans-serif; }
    .tl-btn:disabled { background: #bbb !important; cursor: default; }
    .tl-file { background: #107c10; }
    .tl-reply-file { background: #0078d4; }
    .tl-reply-delete { background: #a4262c; }
    .tl-confirm-file { background: #107c10; font-weight: 700; }
    .tl-delete { background: #a4262c; }
    .tl-flag { background: #ca5010; }
    .tl-skip { background: #605e5c; }
    .tl-working { font-size: 15px; color: #555; font-style: italic; }
    .tl-armed-label { flex-basis: 100%; font-size: 14px; color: #0078d4; font-style: italic; margin-bottom: 2px; }
    .tl-learned { color: #107c10; }
    .tl-ambiguous { color: #ca5010; font-style: italic; }
  </style>
</head>
<body>
  <div style="background:#0078d4;color:#fff;font-size:13px;font-weight:700;padding:3px 10px;margin:-20px -20px 12px -20px;letter-spacing:1px;">HMF FILER v10</div>
  <div id="status">Loading…</div>
  <div id="queue-status"></div>
  <div id="dialog-ver"></div>
  <div id="thread-list"></div>
</body>
</html>
